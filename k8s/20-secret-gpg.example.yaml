# DO NOT commit a real key. Generate the Secret with scripts/create-gpg-secret.sh,
# which produces a passphrase-less signing key and applies it directly.
#
# This file documents the expected shape if you prefer to manage it yourself.
# Keys:
#   gpg-private-key  (required) — ASCII-armored exported private key
#   gpg-passphrase   (optional) — only if the key is passphrase-protected
#   nvchecker-keyfile (optional) — nvchecker keyfile, e.g. a GitHub token
apiVersion: v1
kind: Secret
metadata:
  name: archrepo-gpg
  namespace: archrepo
type: Opaque
stringData:
  gpg-private-key: |
    -----BEGIN PGP PRIVATE KEY BLOCK-----
    ... export with: gpg --armor --export-secret-keys <KEYID> ...
    -----END PGP PRIVATE KEY BLOCK-----
  # gpg-passphrase: "super-secret"
  # nvchecker-keyfile: |
  #   [keys]
  #   github = "ghp_xxx"
